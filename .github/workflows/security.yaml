name: security

on:
  push:
    branches:
      - "main"

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

permissions: {}

jobs:
  scan-source:
    name: scan-source
    runs-on: ubuntu-latest
    permissions:
      contents: read # checkout (top-level permissions: {} resets it to none)
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Generate source SARIF via Dagger
        uses: dagger/dagger-for-github@v8.4.1
        with:
          version: "v0.21.4"
          call: >-
            ci security-source-sarif
            export --path trivy-source.sarif
          cloud-token: ${{ secrets.DAGGER_CLOUD_TOKEN }}
          enable-github-summary: "true"

      - name: Upload SARIF to GitHub Code Scanning
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-source.sarif
          category: trivy-source

  discover-images:
    name: discover-images
    runs-on: ubuntu-latest
    permissions:
      contents: read # checkout (top-level permissions: {} resets it to none)
    outputs:
      packages: ${{ steps.packages.outputs.packages }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: List image packages via Dagger
        uses: dagger/dagger-for-github@v8.4.1
        with:
          version: "v0.21.4"
          call: ci image-packages export --path image-packages.json
          cloud-token: ${{ secrets.DAGGER_CLOUD_TOKEN }}

      - name: Set matrix
        id: packages
        run: echo "packages=$(cat image-packages.json)" >> "$GITHUB_OUTPUT"

  scan-image:
    name: scan-image (${{ matrix.package }})
    needs: discover-images
    runs-on: ubuntu-latest
    permissions:
      contents: read # checkout (top-level permissions: {} resets it to none)
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        package: ${{ fromJSON(needs.discover-images.outputs.packages) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Generate image SARIF via Dagger
        uses: dagger/dagger-for-github@v8.4.1
        with:
          version: "v0.21.4"
          call: >-
            ci security-image-sarif --pkg=${{ matrix.package }}
            export --path trivy-image.sarif
          cloud-token: ${{ secrets.DAGGER_CLOUD_TOKEN }}
          enable-github-summary: "true"

      - name: Upload SARIF to GitHub Code Scanning
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-image.sarif
          category: trivy-image-${{ matrix.package }}
