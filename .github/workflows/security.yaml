name: security

on:
  push:
    branches:
      - "main"

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

permissions: {}

jobs:
  scan-source:
    name: scan-source
    runs-on: ubuntu-latest
    permissions:
      contents: read # checkout (top-level permissions: {} resets it to none)
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Generate source SARIF via Dagger
        uses: dagger/dagger-for-github@v8.4.1
        with:
          version: "v0.21.4"
          call: >-
            ci security-source-sarif
            export --path trivy-source.sarif
          cloud-token: ${{ secrets.DAGGER_CLOUD_TOKEN }}
          enable-github-summary: "true"

      - name: Upload SARIF to GitHub Code Scanning
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-source.sarif
          category: trivy-source

  scan-image:
    name: scan-image
    runs-on: ubuntu-latest
    permissions:
      contents: read # checkout (top-level permissions: {} resets it to none)
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Generate image SARIF via Dagger
        uses: dagger/dagger-for-github@v8.4.1
        with:
          version: "v0.21.4"
          call: >-
            ci security-image-sarif
            export --path trivy-image.sarif
          cloud-token: ${{ secrets.DAGGER_CLOUD_TOKEN }}
          enable-github-summary: "true"

      - name: Upload SARIF to GitHub Code Scanning
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-image.sarif
          category: trivy-image
