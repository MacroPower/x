name: build

# Snapshot-builds ansivideo across all targets on changes to the binary or its
# release orchestration, catching cross-compilation breakage before a release.
on:
  push:
    branches:
      - main
    paths:
      - ansivideo/**
      - ci/**
      # `ci build` composes the goreleaser toolchain, so its changes can break
      # cross-compilation too.
      - toolchains/goreleaser/**
      - .github/workflows/build.yaml
  pull_request:
    paths:
      - ansivideo/**
      - ci/**
      - toolchains/goreleaser/**
      - .github/workflows/build.yaml

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

permissions:
  contents: read

jobs:
  build:
    name: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Build via Dagger
        uses: dagger/dagger-for-github@v8.4.1
        with:
          version: "v0.21.4"
          call: ci build
          cloud-token: ${{ secrets.DAGGER_CLOUD_TOKEN }}
          enable-github-summary: "true"
