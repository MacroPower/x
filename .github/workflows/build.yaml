name: build

# Snapshot-builds every releasable package across all targets on changes to a
# package, the release orchestration, or its toolchain, catching
# cross-compilation breakage before a release. The package matrix is discovered
# from the per-package release.yaml manifests by `ci packages`, so a new package
# is built with no workflow edits.
on:
  push:
    branches:
      - main
    paths:
      - "**/*.go"
      - "**/go.mod"
      - "**/go.sum"
      - "**/.goreleaser.yaml"
      - "**/release.yaml"
      - "ci/**"
      # `ci build` composes the goreleaser toolchain, so its changes can break
      # cross-compilation too.
      - toolchains/goreleaser/**
      - .github/workflows/build.yaml
  pull_request:
    paths:
      - "**/*.go"
      - "**/go.mod"
      - "**/go.sum"
      - "**/.goreleaser.yaml"
      - "**/release.yaml"
      - "ci/**"
      - toolchains/goreleaser/**
      - .github/workflows/build.yaml

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

permissions:
  contents: read

jobs:
  discover:
    name: discover
    runs-on: ubuntu-latest
    outputs:
      packages: ${{ steps.packages.outputs.packages }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: List packages via Dagger
        uses: dagger/dagger-for-github@v8.4.1
        with:
          version: "v0.21.4"
          call: ci packages export --path packages.json
          cloud-token: ${{ secrets.DAGGER_CLOUD_TOKEN }}

      - name: Set matrix
        id: packages
        run: echo "packages=$(cat packages.json)" >> "$GITHUB_OUTPUT"

  build:
    name: build (${{ matrix.package }})
    needs: discover
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        package: ${{ fromJSON(needs.discover.outputs.packages) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Build via Dagger
        uses: dagger/dagger-for-github@v8.4.1
        with:
          version: "v0.21.4"
          call: ci build --pkg=${{ matrix.package }}
          cloud-token: ${{ secrets.DAGGER_CLOUD_TOKEN }}
          enable-github-summary: "true"
