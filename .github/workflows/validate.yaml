name: validate

on:
  push:
    branches:
      - "main"
  pull_request:

concurrency:
  group: validate-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

permissions:
  contents: read

jobs:
  check:
    name: check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Run all checks
        uses: dagger/dagger-for-github@v8.4.1
        with:
          version: "v0.21.4"
          verb: check
          cloud-token: ${{ secrets.DAGGER_CLOUD_TOKEN }}
          enable-github-summary: "true"

      - name: Export coverage profile
        if: ${{ !cancelled() }}
        uses: dagger/dagger-for-github@v8.4.1
        with:
          version: "v0.21.4"
          call: go test-coverage --output=coverage.txt
          cloud-token: ${{ secrets.DAGGER_CLOUD_TOKEN }}
          enable-github-summary: "true"

      - name: Upload coverage reports to Codecov
        if: ${{ !cancelled() }}
        uses: codecov/codecov-action@v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}

  toolchains:
    name: toolchains (${{ matrix.module }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Every shared toolchain module with a tests/ submodule. Keep this
        # list in sync with the directories under toolchains/.
        module:
          - bench
          - commitlint
          - cosign
          - devbox
          - go
          - goreleaser
          - prettier
          - security
          - syft
          - zizmor
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Run toolchain tests
        uses: dagger/dagger-for-github@v8.4.1
        with:
          version: "v0.21.4"
          verb: call
          module: toolchains/${{ matrix.module }}/tests
          args: all
          cloud-token: ${{ secrets.DAGGER_CLOUD_TOKEN }}
          enable-github-summary: "true"
