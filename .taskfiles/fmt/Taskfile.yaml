version: "3"

set: [errexit, nounset, pipefail]
shopt: [globstar]

tasks:
  format:
    desc: Formats YAML, JSON, and Markdown files via Dagger
    cmds:
      - dagger call -y prettier format

  lint:
    desc: Lints YAML, JSON, and Markdown files via Dagger
    cmds:
      - dagger check prettier:lint
