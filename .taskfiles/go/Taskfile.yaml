version: "3"

set: [errexit, nounset, pipefail]
shopt: [globstar]

# Go tasks call the local toolchain (go, golangci-lint) directly; devbox
# provides both on PATH. The repo is a go.work workspace with no root go.mod,
# so the default ./... pattern matches nothing at the root and is instead
# expressed as per-module ./<dir>/... patterns. GO_MODULES is the list of
# workspace module directories, derived from go.work so it never drifts.
vars:
  GO_MODULES:
    sh: |
      go work edit -json | grep -oE '"DiskPath": *"[^"]*"' | sed -E 's/^"DiskPath": *"//; s/"$//; s|^\./||' | xargs
  GO_PKGS:
    sh: for m in {{.GO_MODULES}}; do printf './%s/... ' "$m"; done
  TEST_TIMEOUT: 30m
  # Test names matching this regex are integration tests: go:test skips them,
  # go:test:integration selects them.
  INTEGRATION_PATTERN: Integration
  DEADCODE_VERSION: v0.45.0 # renovate: datasource=go depName=golang.org/x/tools

tasks:
  # lint, format, tidy, and tidy:check fan out to one internal invocation per
  # module so each module is fingerprinted independently: editing one module
  # re-runs only that module's check, and a no-op `task check` skips them all.
  # Each internal task carries the module in its `label` so Task stores a
  # separate checksum per module (a single name would share one checksum and
  # the modules would clobber each other). Checksums live in .task/, which
  # `task clean` removes and .gitignore excludes.
  #
  # Each task's `sources` list is scoped to exactly what changes its result.
  # lint and format additionally read .golangci.yaml and depend on the
  # golangci-lint binary, so devbox.lock is a source (a Go or golangci-lint
  # version bump invalidates their cache). tidy reads neither, so its sources
  # stop at the module files and the workspace files; the Go version it cares
  # about is already pinned in go.work, and CI's `go mod tidy -diff` is the
  # backstop against any binary-patch drift.
  _lint:
    internal: true
    label: "go:lint ({{.MODULE}})"
    sources: &go-lint-sources
      - "{{.MODULE}}/**/*.go"
      - "{{.MODULE}}/go.mod"
      - "{{.MODULE}}/go.sum"
      - go.work
      - go.work.sum
      - .golangci.yaml
      - devbox.lock
    cmd: cd {{.MODULE}} && golangci-lint run

  _format:
    internal: true
    label: "go:format ({{.MODULE}})"
    sources: *go-lint-sources
    cmd: cd {{.MODULE}} && golangci-lint run --fix

  _tidy:
    internal: true
    label: "go:tidy ({{.MODULE}})"
    sources: &go-tidy-sources
      - "{{.MODULE}}/**/*.go"
      - "{{.MODULE}}/go.mod"
      - "{{.MODULE}}/go.sum"
      - go.work
      - go.work.sum
    cmd: cd {{.MODULE}} && go mod tidy

  _tidy:check:
    internal: true
    label: "go:tidy:check ({{.MODULE}})"
    sources: *go-tidy-sources
    cmd: cd {{.MODULE}} && go mod tidy -diff

  lint:
    desc: Lints Go code with golangci-lint across all workspace modules
    cmds:
      - for: { var: GO_MODULES }
        task: _lint
        vars: { MODULE: "{{.ITEM}}" }

  format:
    desc: Formats Go code with golangci-lint --fix across all workspace modules
    cmds:
      - for: { var: GO_MODULES }
        task: _format
        vars: { MODULE: "{{.ITEM}}" }

  tidy:
    desc: Tidies go.mod and go.sum across all workspace modules
    cmds:
      - for: { var: GO_MODULES }
        task: _tidy
        vars: { MODULE: "{{.ITEM}}" }

  tidy:check:
    desc: Verifies go.mod and go.sum are tidy across all workspace modules
    summary: |
      Runs `go mod tidy -diff` in each module, which reports the changes tidy
      would make and exits non-zero if any are needed, without modifying the
      files. Being read-only, it is safe to run alongside go:lint and go:test
      and needs no .git (the check runs inside the devbox container in CI).
    cmds:
      - for: { var: GO_MODULES }
        task: _tidy:check
        vars: { MODULE: "{{.ITEM}}" }

  # test, test:integration, and test:cover are deliberately not fingerprinted
  # with `sources`. Go's build/test cache is content-addressed over the full
  # transitive dependency graph (including cross-module imports such as
  # magicschema -> jsonschema) and re-runs exactly the packages that changed;
  # a file-glob fingerprint here would be coarser and could skip a stale test.
  test:
    desc: Runs Go unit tests (skips integration tests) with the race detector
    summary: |
      Runs the workspace unit tests with the race detector.

      For a single package or extra flags, call go directly:
        go test -run TestName ./magicschema/...
    cmds:
      - go test -timeout={{.TEST_TIMEOUT}} -skip {{.INTEGRATION_PATTERN}} -race {{.GO_PKGS}}

  test:integration:
    desc: Runs Go integration tests with the race detector
    cmds:
      - go test -timeout={{.TEST_TIMEOUT}} -run {{.INTEGRATION_PATTERN}} -race {{.GO_PKGS}}

  test:cover:
    desc: Runs all Go tests with coverage profiling
    summary: |
      Runs every test (unit and integration) with -coverprofile, which
      disables Go's test result cache. Writes the profile to OUTPUT.

      Args:
        OUTPUT: Coverage profile path (default: .test/coverage.txt)
    vars:
      OUTPUT: '{{.OUTPUT | default ".test/coverage.txt"}}'
    env:
      CGO_ENABLED: "1"
    cmds:
      - mkdir -p .test
      - go test -timeout={{.TEST_TIMEOUT}} -race -coverprofile={{.OUTPUT}} {{.GO_PKGS}}

  generate:
    desc: Runs go generate across all workspace modules
    cmds:
      - go generate {{.GO_PKGS}}

  # deadcode, bench, and docs are advisory tasks whose whole purpose is the
  # report they print to stdout. They are deliberately not fingerprinted: a
  # `sources` cache hit would skip the command and suppress that output, which
  # is the opposite of useful. Run them on demand.
  deadcode:
    desc: Reports unreachable Go functions (advisory)
    label: "go:deadcode {{.PKG}}"
    summary: |
      Reports unreachable functions via the golang.org/x/tools deadcode
      analyzer. Advisory only; not part of the standard gate.

      Args:
        PKG: Go package(s) to analyze (default: every workspace module)
    vars:
      PKG: "{{.PKG | default .GO_PKGS}}"
    cmds:
      - go run golang.org/x/tools/cmd/deadcode@{{.DEADCODE_VERSION}} {{.PKG}}

  bench:
    desc: Runs Go benchmarks
    label: "go:bench {{.PKG}}"
    summary: |
      Runs Go benchmarks.

      Args:
        PKG: Go package to benchmark (default: go.jacobcolvin.com/x/...)
        FLAGS: Additional flags to pass to `go test` (default: "")

      Examples:
        task go:bench PKG=./magicschema/helm FLAGS="-cpuprofile profile.out -run=^\$"
    vars:
      PKG: '{{.PKG | default "go.jacobcolvin.com/x/..."}}'
      FLAGS: '{{.FLAGS | default ""}}'
    cmds:
      - go test -bench=. -benchmem {{.FLAGS}} {{.PKG}}

  docs:
    desc: Prints Go documentation for all packages
    label: "go:docs {{.PKG}}"
    summary: |
      Prints Go documentation for all packages.

      Args:
        PKG: Go package(s) to document (default: go.jacobcolvin.com/x/...)
        FLAGS: Additional flags to pass to `go doc` (default: "")
    vars:
      PKG: '{{.PKG | default "go.jacobcolvin.com/x/..."}}'
      FLAGS: '{{.FLAGS | default ""}}'
      PACKAGES:
        sh: go list {{.PKG}} | grep -v -E '/(examples|cmd)(/|$)'
    cmds:
      - for: { var: PACKAGES, split: "\n" }
        cmd: echo "--------------------------------------------------------------------------------" && go doc {{.FLAGS}} {{.ITEM}}
