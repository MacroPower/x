version: "3"

set: [errexit, nounset, pipefail]
shopt: [globstar]

tasks:
  format:
    desc: Formats Go code via Dagger
    cmds:
      - dagger call -y go format-go

  lint:
    desc: Lints Go code and module files via Dagger
    cmds:
      - dagger check go:lint go:check-tidy

  test:
    desc: Runs Go tests via Dagger
    summary: |
      Runs Go tests via Dagger.

      For a single package or extra flags, call the toolchain directly:
        dagger call go test --pkgs=./magicschema/... --run=TestName
    cmds:
      - dagger check ci:test-unit ci:test-integration

  cover:
    desc: Runs Go tests with coverage via Dagger
    cmds:
      - dagger call go test-coverage --output=.test/coverage.txt

  tidy:
    desc: Tidies go.mod and go.sum across all modules via Dagger
    cmds:
      - dagger call -y go tidy

  gen:
    desc: Generates Go code via Dagger
    cmds:
      - dagger call -y go generate

  deadcode:
    desc: Finds dead code in Go via Dagger
    cmds:
      - dagger call go lint-deadcode

  bench:
    desc: Runs Go benchmarks on the host
    label: "go:bench {{.PKG}}"
    summary: |
      Runs Go benchmarks on the host. Benchmarks measure host performance,
      so they stay outside Dagger where containerization would distort
      results.

      Args:
        PKG: Go package to benchmark (default: go.jacobcolvin.com/x/...)
        FLAGS: Additional flags to pass to `go test` (default: "")

      Examples:
        task go:bench PKG=./magicschema/helm FLAGS="-cpuprofile profile.out -run=^\$"
    vars:
      PKG: '{{.PKG | default "go.jacobcolvin.com/x/..."}}'
      FLAGS: '{{.FLAGS | default ""}}'
    cmds:
      - go test -bench=. -benchmem {{.FLAGS}} {{.PKG}}

  benchmark:
    desc: Measures pipeline stage timings via Dagger
    cmds:
      - dagger call go benchmark-summary

  benchmark:parallel:
    desc: Measures full-pipeline wall-clock time via Dagger (parallel)
    cmds:
      - dagger call go benchmark-summary --parallel

  docs:
    desc: Prints Go documentation for all packages
    label: "go:docs {{.PKG}}"
    summary: |
      Prints Go documentation for all packages. Runs on the host for fast,
      interactive reading.

      Args:
        PKG: Go package(s) to document (default: go.jacobcolvin.com/x/...)
        FLAGS: Additional flags to pass to `go doc` (default: "")
    vars:
      PKG: '{{.PKG | default "go.jacobcolvin.com/x/..."}}'
      FLAGS: '{{.FLAGS | default ""}}'
      PACKAGES:
        sh: go list {{.PKG}} | grep -v -E '/(examples|cmd)(/|$)'
    cmds:
      - for: { var: PACKAGES, split: "\n" }
        cmd: echo "--------------------------------------------------------------------------------" && go doc {{.FLAGS}} {{.ITEM}}
