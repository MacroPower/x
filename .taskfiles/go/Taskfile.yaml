version: "3"

set: [errexit, nounset, pipefail]
shopt: [globstar]

vars:
  GOTESTSUM_VERSION: v1.12.1
  DEADCODE_VERSION: v0.32.0
  # In workspace mode `go list -m -f '{{.Dir}}'` prints exactly the module
  # directories named in go.work, so golangci-lint can run once per module.
  # The Go template braces are escaped so Task forwards them to `go` verbatim.
  GO_MODULE_DIRS:
    sh: go list -m -f '{{`{{.Dir}}`}}'

tasks:
  format:
    desc: Formats Go code
    sources:
      - "**/*.go"
      - exclude: "{dist,.devbox,.worktrees,toolchains}/**"
      - "**/go.mod"
      - "**/go.sum"
      - go.work
      - .golangci.yaml
    cmds:
      # golangci-lint does not span a go.work workspace; its gci formatter
      # reads go.mod from the working directory, so run it in each module.
      - for: { var: GO_MODULE_DIRS, split: "\n" }
        cmd: cd '{{.ITEM}}' && golangci-lint run --fix

  code-lint:
    internal: true
    desc: Lints Go code
    sources:
      - "**/*.go"
      - exclude: "{dist,.devbox,.worktrees,toolchains}/**"
      - "**/go.mod"
      - "**/go.sum"
      - go.work
      - .golangci.yaml
    cmds:
      - for: { var: GO_MODULE_DIRS, split: "\n" }
        cmd: cd '{{.ITEM}}' && golangci-lint run

  goreleaser-lint:
    internal: true
    desc: Lints GoReleaser configuration
    sources:
      - .goreleaser*
    cmds:
      - goreleaser check

  lint:
    desc: Lints Go code and config files
    deps: [code-lint, goreleaser-lint]

  test:
    desc: Runs Go tests
    label: "go:test {{.PKG}}"
    summary: |
      Runs Go tests

      Args:
        PKG: Go package to test (default: go.jacobcolvin.com/x/...)
        FLAGS: Additional flags to pass to `go test` (default: "")
        PKG_FLAGS: Additional flags to pass to test packages (default: "")
    vars:
      # The workspace root is not itself a module, so `./...` matches nothing
      # there; the module path pattern spans every go.work module instead.
      PKG: '{{.PKG | default "go.jacobcolvin.com/x/..."}}'
      FLAGS: '{{.FLAGS | default ""}}'
      PKG_FLAGS: '{{.PKG_FLAGS | default ""}}'
    cmds:
      - go test -race -vet=all {{.FLAGS}} {{.PKG}} {{.PKG_FLAGS}}

  cover:
    desc: Runs Go tests with coverage
    deps: [tools:gotestsum]
    sources:
      - "**/*.go"
      - exclude: "{dist,.devbox,.worktrees,toolchains}/**"
      - "**/go.mod"
      - "**/go.sum"
      - go.work
    generates:
      - .test/cover.out
      - .test/junit.xml
    cmds:
      - cmd: mkdir -p .test/
        silent: true
      - gotestsum --junitfile=.test/junit.xml --format=pkgname -- -race -vet=all -coverprofile=.test/cover.out go.jacobcolvin.com/x/...

  bench:
    desc: Runs Go benchmarks
    label: "go:bench {{.PKG}}"
    summary: |
      Runs Go benchmarks

      Args:
        PKG: Go package to test (default: go.jacobcolvin.com/x/...)
        FLAGS: Additional flags to pass to `go test` (default: "")

      Examples:
        task go:bench PKG=./magicschema/helm FLAGS="-cpuprofile profile.out -run=^\$"
    vars:
      PKG: '{{.PKG | default "go.jacobcolvin.com/x/..."}}'
      FLAGS: '{{.FLAGS | default ""}}'
    cmds:
      - go test -bench=. -benchmem {{.FLAGS}} {{.PKG}}

  docs:
    desc: Prints Go documentation for all packages
    label: "go:docs {{.PKG}}"
    summary: |
      Prints Go documentation for all packages.

      Args:
        PKG: Go package(s) to document (default: go.jacobcolvin.com/x/...)
        FLAGS: Additional flags to pass to `go doc` (default: "")
    vars:
      PKG: '{{.PKG | default "go.jacobcolvin.com/x/..."}}'
      FLAGS: '{{.FLAGS | default ""}}'
      PACKAGES:
        sh: go list {{.PKG}} | grep -v -E '/(examples|cmd)(/|$)'
    cmds:
      - for: { var: PACKAGES, split: "\n" }
        cmd: echo "--------------------------------------------------------------------------------" && go doc {{.FLAGS}} {{.ITEM}}

  gen:
    desc: Generates Go code
    cmds:
      - go generate go.jacobcolvin.com/x/...

  build:
    desc: Builds Go binaries
    vars:
      FLAGS: '{{.FLAGS | default "--skip=docker,homebrew,nix,sign"}}'
    sources:
      - "**/*.go"
      - exclude: "{dist,.devbox,.worktrees,toolchains}/**"
      - "**/go.mod"
      - "**/go.sum"
      - go.work
      - .goreleaser*
    cmds:
      - goreleaser release --snapshot --clean {{ .FLAGS }}

  release:
    desc: Releases Go binaries
    vars:
      FLAGS: '{{.FLAGS | default ""}}'
    cmds:
      - goreleaser release --clean {{.FLAGS}}

  deadcode:
    desc: Finds dead code in Go
    summary: |
      Finds dead code in Go.

      Args:
        PKG: Go package(s) to evaluate (default: go.jacobcolvin.com/x/...)
        FLAGS: Additional flags to pass to `deadcode` (default: "")

      Examples:
        task go:deadcode FLAGS="-test -generated"
    deps: [tools:deadcode]
    vars:
      PKG: '{{.PKG | default "go.jacobcolvin.com/x/..."}}'
      FLAGS: '{{.FLAGS | default ""}}'
    cmds:
      - deadcode {{.FLAGS}} {{.PKG}}

  tools:gotestsum:
    internal: true
    run: once
    desc: Installs gotestsum
    status:
      - command -v gotestsum
    cmds:
      - go install gotest.tools/gotestsum@{{.GOTESTSUM_VERSION}}

  tools:deadcode:
    internal: true
    run: once
    desc: Installs deadcode
    status:
      - command -v deadcode
    cmds:
      - go install golang.org/x/tools/cmd/deadcode@{{.DEADCODE_VERSION}}
