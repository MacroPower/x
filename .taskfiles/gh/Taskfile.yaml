version: "3"

set: [errexit, nounset, pipefail]
shopt: [globstar]

tasks:
  renovate:lint:
    internal: true
    desc: Validates the Renovate configuration via Dagger
    cmds:
      - dagger check ci:lint-renovate

  actions:lint:
    internal: true
    desc: Lints GitHub Actions workflows via Dagger
    cmds:
      - dagger check zizmor:lint

  lint:
    desc: Lints GitHub configuration via Dagger
    cmds:
      - dagger check zizmor:lint ci:lint-renovate
