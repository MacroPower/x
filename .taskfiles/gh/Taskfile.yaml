version: "3"

set: [errexit, nounset, pipefail]
shopt: [globstar]

# GitHub configuration linting. zizmor runs locally (devbox provides it);
# Renovate config validation stays in Dagger (a pinned renovate-config-validator
# in a Node container), the one quality check devbox does not provide.
tasks:
  actions:lint:
    desc: Lints GitHub Actions workflows with zizmor
    cmds:
      - zizmor .github/workflows --config .github/zizmor.yaml

  renovate:lint:
    desc: Validates the Renovate configuration with renovate-config-validator
    summary: |
      Validation runs renovate-config-validator at a pinned version in a Node
      container via the `ci` toolchain. This is the only check that runs
      through Dagger rather than directly from devbox.
    cmds:
      - dagger call ci lint-renovate

  lint:
    desc: Lints GitHub configuration (Actions workflows + Renovate config)
    deps: [actions:lint, renovate:lint]
