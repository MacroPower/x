version: "3"

set: [errexit, nounset, pipefail]
shopt: [globstar]

vars:
  # Host directory the snapshot build is exported to; cleaned by the root
  # `clean` task and ignored by .gitignore.
  DIST: ./dist

tasks:
  check:
    desc: Validates every releasable package's GoReleaser configuration
    # Validation depends only on the GoReleaser configs and release manifests, so
    # `sources` skips the Dagger invocation when none of them change.
    sources:
      - "*/.goreleaser.yaml"
      - "*/release.yaml"
    cmd: dagger call ci lint-releaser

  # snapshot is not fingerprinted here: it cross-compiles a package, whose
  # build inputs span sibling workspace modules, and Dagger's content-addressed
  # cache already rebuilds only when an input changes.
  snapshot:
    desc: Cross-compiles a package for all targets without publishing (PACKAGE=<dir>)
    requires:
      vars: [PACKAGE]
    cmd: dagger call ci build --pkg={{.PACKAGE}} export --path={{.DIST}}
